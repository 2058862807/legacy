<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dream Assistant</title>
  <link rel="icon" href="favicon.ico">
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 0; background: #0b1220; color: #e9eef7 }
    .wrap { max-width: 900px; margin: 40px auto; padding: 16px }
    h1 { font-size: 26px; margin: 0 0 12px 0 }
    .card { background: #121a2d; border: 1px solid #1f2a48; border-radius: 14px; padding: 16px; margin: 12px 0 }
    button { padding: 10px 16px; border-radius: 10px; border: 1px solid #2f3b63; background: #1a2440; color: #e9eef7; cursor: pointer }
    input, textarea { width: 100%; background: #0f1730; color: #e9eef7; border: 1px solid #2f3b63; border-radius: 10px; padding: 10px }
    label { font-size: 12px; color: #a9b6d6 }
    .row { display: flex; gap: 12px; flex-wrap: wrap }
    .row > div { flex: 1 1 280px }
    .small { font-size: 12px; color: #a9b6d6 }
  </style>
</head>
<body>
<div class="wrap">
  <h1>Dream Assistant</h1>
  <div class="card">
    <div class="row">
      <div>
        <label>Prompt</label>
        <textarea id="prompt" rows="4" placeholder="Say or type a request"></textarea>
      </div>
    </div>
    <div class="row">
      <div><button id="speak">Speak</button></div>
      <div><button id="listen">Listen</button></div>
      <div>
        <select id="provider">
          <option value="openai">OpenAI</option>
          <option value="deepseek">DeepSeek</option>
        </select>
        <input id="model" value="gpt-4o-mini" />
        <button id="run">Run</button>
      </div>
    </div>
    <div class="small">Voice uses your browser voice. Pick a female voice in system settings.</div>
    <pre id="out" class="small"></pre>
  </div>

  <div class="card">
    <h3>Git push</h3>
    <div class="row">
      <div><input id="repo" placeholder="Path to repo" /></div>
      <div><input id="msg" placeholder="Commit message" /></div>
      <div><button id="push">Push</button></div>
    </div>
    <pre id="gitout" class="small"></pre>
  </div>

  <div class="card">
    <h3>Vercel deploy</h3>
    <div class="row">
      <div><input id="proj" placeholder="Project directory" /></div>
      <div><button id="deploy">Deploy</button></div>
    </div>
    <pre id="vercelout" class="small"></pre>
  </div>

  <div class="card">
    <h3>Email quick reply</h3>
    <div class="row">
      <div><input id="search" placeholder="IMAP search query, example UNSEEN FROM someone@x.com" /></div>
      <div><input id="reply" placeholder="Reply text" /></div>
      <div><button id="send">Reply</button></div>
    </div>
    <pre id="mailout" class="small"></pre>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
